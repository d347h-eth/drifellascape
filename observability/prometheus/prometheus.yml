global:
    scrape_interval: 5s
    evaluation_interval: 5s

scrape_configs:
    - job_name: "drifellascape-backend"
      metrics_path: /metrics
      static_configs:
          - targets: ["127.0.0.1:42840"]
            labels:
                runtime: "backend-api"

    - job_name: "drifellascape-worker"
      metrics_path: /metrics
      static_configs:
          - targets: ["127.0.0.1:42841"]
            labels:
                runtime: "sync-worker"
