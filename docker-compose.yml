version: "3.9"

services:
    backend:
        image: node:24-bookworm-slim
        working_dir: /app
        command: sh -lc "apt-get update && apt-get install -y --no-install-recommends build-essential python3 && rm -rf /var/lib/apt/lists/* && corepack enable && yarn install --immutable && yarn backend:run"
        environment:
            BACKEND_PORT: ${BACKEND_PORT:-42800}
            BACKEND_REFRESH_MS: ${BACKEND_REFRESH_MS:-30000}
            BACKEND_DEBUG: ${BACKEND_DEBUG:-}
            BACKEND_METRICS_ENABLED: ${BACKEND_METRICS_ENABLED:-true}
            BACKEND_METRICS_HOST: 0.0.0.0
            BACKEND_METRICS_PORT: ${BACKEND_METRICS_PORT:-42840}
        ports:
            - "127.0.0.1:${BACKEND_METRICS_PORT:-42840}:${BACKEND_METRICS_PORT:-42840}"
        volumes:
            - ./:/app
            - ./logs:/app/logs
        networks:
            default:
            public-edge:
                aliases:
                    - drifella-backend
        restart: unless-stopped

    worker:
        image: node:24-bookworm-slim
        working_dir: /app
        command: sh -lc "apt-get update && apt-get install -y --no-install-recommends build-essential python3 && rm -rf /var/lib/apt/lists/* && corepack enable && yarn install --immutable && yarn worker:run"
        environment:
            WORKER_SYNC_INTERVAL_MS: ${WORKER_SYNC_INTERVAL_MS:-30000}
            MARKET_EVENT_RECENT_PAGES: ${MARKET_EVENT_RECENT_PAGES:-2}
            MARKET_EVENT_BACKFILL_PAGES: ${MARKET_EVENT_BACKFILL_PAGES:-5}
            HELIUS_KEY: ${HELIUS_KEY:-}
            OWNERSHIP_SYNC_INTERVAL_MS: ${OWNERSHIP_SYNC_INTERVAL_MS:-600000}
            WORKER_METRICS_ENABLED: ${WORKER_METRICS_ENABLED:-true}
            WORKER_METRICS_HOST: 0.0.0.0
            WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-42841}
            COMMON_HTTP_FETCH_TIMEOUT_MS: ${COMMON_HTTP_FETCH_TIMEOUT_MS:-30000}
            COMMON_HTTP_FETCH_RETRY_MAX_ATTEMPTS: ${COMMON_HTTP_FETCH_RETRY_MAX_ATTEMPTS:-3}
            COMMON_HTTP_FETCH_RETRY_BASE_DELAY_MS: ${COMMON_HTTP_FETCH_RETRY_BASE_DELAY_MS:-2000}
            COMMON_HTTP_FETCH_RETRY_MAX_DELAY_MS: ${COMMON_HTTP_FETCH_RETRY_MAX_DELAY_MS:-8000}
        ports:
            - "127.0.0.1:${WORKER_METRICS_PORT:-42841}:${WORKER_METRICS_PORT:-42841}"
        volumes:
            - ./:/app
            - ./logs:/app/logs
        depends_on:
            - backend
        restart: unless-stopped

    loki:
        image: grafana/loki:3.0.0
        profiles:
            - observability
        command: ["-config.file=/etc/loki/config.yaml"]
        ports:
            - "127.0.0.1:42830:42830"
        volumes:
            - ./observability/loki/loki-config.yaml:/etc/loki/config.yaml:ro
            - loki-data:/loki

    tempo:
        image: grafana/tempo:2.7.1
        profiles:
            - observability
        command: ["-config.file=/etc/tempo/config.yaml"]
        ports:
            - "127.0.0.1:42831:42831"
            - "127.0.0.1:42832:42832"
        volumes:
            - ./observability/tempo/tempo-config.yaml:/etc/tempo/config.yaml:ro
            - tempo-data:/var/tempo

    pyroscope:
        image: grafana/pyroscope:latest
        profiles:
            - observability
        command: ["-server.http-listen-port=42833"]
        ports:
            - "127.0.0.1:42833:42833"
        volumes:
            - pyroscope-data:/var/lib/pyroscope

    alloy:
        image: grafana/alloy:latest
        profiles:
            - observability
        command:
            [
                "run",
                "--server.http.listen-addr=0.0.0.0:42836",
                "/etc/alloy/config.alloy",
            ]
        depends_on:
            - loki
        volumes:
            - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
            - ./tmp/logs:/var/log/drifellascape:ro

    prometheus:
        image: prom/prometheus:v2.54.1
        profiles:
            - observability
        network_mode: host
        command:
            [
                "--config.file=/etc/prometheus/prometheus.yml",
                "--web.listen-address=127.0.0.1:42834",
            ]
        volumes:
            - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus

    grafana:
        image: grafana/grafana:latest
        profiles:
            - observability
        network_mode: host
        depends_on:
            - loki
            - prometheus
            - tempo
            - pyroscope
        environment:
            GF_SERVER_HTTP_ADDR: 127.0.0.1
            GF_SERVER_HTTP_PORT: "42835"
            GF_SECURITY_ADMIN_USER: ${OBSERVABILITY_GRAFANA_ADMIN_USER:-admin}
            GF_SECURITY_ADMIN_PASSWORD: ${OBSERVABILITY_GRAFANA_ADMIN_PASSWORD:-admin}
            GF_USERS_ALLOW_SIGN_UP: "false"
        volumes:
            - grafana-data:/var/lib/grafana
            - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

    frontend-build:
        image: node:24-bookworm-slim
        working_dir: /app
        command: >-
            bash -lc "set -euo pipefail &&
            apt-get update &&
            apt-get install -y --no-install-recommends build-essential python3 &&
            rm -rf /var/lib/apt/lists/* &&
            export COREPACK_ENABLE_DOWNLOAD_PROMPT=0 &&
            corepack enable &&
            yarn install --immutable &&
            if [ -z \"$${RELEASE_ID:-}\" ]; then echo 'RELEASE_ID is required' >&2; exit 1; fi &&
            rm -rf /app/releases/\"$${RELEASE_ID}\" &&
            mkdir -p /app/releases/\"$${RELEASE_ID}\" &&
            yarn workspace @drifellascape/frontend build --outDir /app/releases/\"$${RELEASE_ID}\""
        environment:
            VITE_API_BASE: ${VITE_API_BASE:-https://api.drifellascape.art}
            VITE_POLL_MS: ${VITE_POLL_MS:-30000}
        volumes:
            - ./:/app

    caddy:
        image: caddy:2-alpine
        profiles:
            - local-caddy
        ports:
            - "42880:80"
            - "42843:443"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
            - ./releases:/srv/releases:ro
            - ./frontend/static:/srv/static:ro
        depends_on:
            - backend
        restart: unless-stopped

    caddy-verify:
        image: caddy:2-alpine
        profiles:
            - verify
        ports:
            - "42888:42888"
        volumes:
            - ./Caddyfile.verify:/etc/caddy/Caddyfile:ro
            - ./releases:/srv/releases:ro
            - ./frontend/static:/srv/static:ro
        depends_on:
            - backend
        restart: unless-stopped

volumes:
    caddy_data:
    caddy_config:
    loki-data:
    tempo-data:
    pyroscope-data:
    prometheus-data:
    grafana-data:

networks:
    public-edge:
        external: true
